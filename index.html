<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Money Diary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f6efe3; --card:#fffdf8; --ink:#3a322b; --ink-soft:#8a7d6e;
  --line:#e7dcc8; --accent:#c4683f; --green:#5b8c5a; --red:#c25b54;
  --display:'Fraunces',serif; --hand:'Mali',cursive; --body:'IBM Plex Sans Thai',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--paper);color:var(--ink);font-family:var(--body);min-height:100vh;-webkit-text-size-adjust:100%;}
body.paper-tex{background-image:radial-gradient(rgba(180,150,110,.07) 1px,transparent 1px);background-size:18px 18px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:var(--body);outline:none;font-size:16px;}
.wrap{max-width:760px;margin:0 auto;padding:0 18px;}
.diary-shadow{box-shadow:0 10px 30px -12px rgba(80,60,40,.35),0 2px 6px -2px rgba(80,60,40,.18);}
.soft-shadow{box-shadow:0 4px 16px -8px rgba(80,60,40,.28);}
.fade-in{animation:fi .5s ease both;}@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.pop{animation:pop .28s cubic-bezier(.2,.9,.3,1.3) both;}@keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.disp{font-family:var(--display);} .hand{font-family:var(--hand);} .muted{color:var(--ink-soft);} .center{text-align:center;}
.svg{width:1em;height:1em;display:inline-block;vertical-align:-.125em;flex-shrink:0;}

/* shelf / landing */
.brand{display:flex;align-items:center;gap:8px;color:var(--accent);font-family:var(--hand);font-weight:600;margin-bottom:4px;}
.title-xl{font-family:var(--display);font-size:2.1rem;line-height:1.08;}
.sub{color:var(--ink-soft);margin-top:6px;}
.hero{position:relative;width:100%;height:200px;border-radius:18px;overflow:hidden;display:block;margin:22px 0 26px;}
.hero .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.5));}
.hero .ct{position:relative;height:100%;padding:18px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;text-align:left;}
.lbl{font-size:.82rem;font-weight:600;color:var(--ink-soft);margin-bottom:8px;display:block;}

/* dropdown */
.dd{position:relative;width:100%;}
.dd-btn{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;color:var(--ink);}
.dd-btn .chev{transition:transform .2s;color:var(--ink-soft);}
.dd-btn.open .chev{transform:rotate(180deg);}
.dd-panel{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--line);border-radius:14px;z-index:30;max-height:62vh;overflow-y:auto;box-shadow:0 12px 30px -10px rgba(80,60,40,.3);}
.dd-item{width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);text-align:left;}
.dd-item:active{background:var(--paper);}
.dd-dot{width:32px;height:42px;border-radius:7px;flex-shrink:0;background-size:cover;background-position:center;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.dd-name{flex:1;line-height:1.2;}
.dd-bal{font-family:var(--display);font-weight:600;font-size:.95rem;}
.dd-create{width:100%;padding:14px 16px;color:var(--accent);font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--paper);}

/* month */
.cover{position:relative;height:208px;}
.cover .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.5));}
.cover .ct{position:relative;max-width:760px;margin:0 auto;height:100%;padding:16px 18px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;}
.cover h1{font-family:var(--display);font-size:2.4rem;line-height:1;display:flex;align-items:center;gap:8px;}
.toprow{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.16);backdrop-filter:blur(4px);font-size:.85rem;white-space:nowrap;color:#fff;}
.pill:active{background:rgba(255,255,255,.3);}
.panel{margin-top:-26px;position:relative;padding-bottom:90px;}
.card{background:var(--card);border-radius:18px;}
.chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:8px 14px;font-size:.9rem;background:var(--paper);color:var(--ink-soft);}
.chip.on{background:var(--accent);color:#fff;}
.sum-bal{display:flex;flex-direction:column;gap:2px;}
.sum-bal b{font-family:var(--display);font-size:1.8rem;font-weight:700;}
.stat{background:var(--paper);border-radius:13px;padding:12px 13px;}
.stat .lb{display:flex;align-items:center;gap:4px;font-size:.75rem;color:var(--ink-soft);margin-bottom:3px;}
.stat .vl{font-family:var(--display);font-weight:600;font-size:1.15rem;}
.seg{display:inline-flex;background:var(--card);border-radius:999px;padding:4px;}
.seg button{display:flex;align-items:center;gap:6px;border-radius:999px;padding:8px 14px;font-size:.88rem;color:var(--ink-soft);white-space:nowrap;}
.seg button.on{background:var(--accent);color:#fff;}
.btn-accent{background:var(--accent);color:#fff;border-radius:12px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:16px 0 12px;flex-wrap:wrap;}

/* calendar */
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-dow div{text-align:center;font-size:.72rem;font-weight:600;color:var(--ink-soft);padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cell{min-height:54px;border-radius:9px;padding:5px 4px;display:flex;flex-direction:column;text-align:left;border:1px solid transparent;}
.cell.has{background:var(--paper);}.cell.has:active{filter:brightness(.95);}
.cell.today{border-color:var(--accent);}
.cell .dn{font-size:.74rem;font-weight:500;}
.cell .am{font-size:.58rem;line-height:1.2;margin-top:auto;word-break:break-all;}

/* list */
.daygrp{background:var(--card);border-radius:16px;overflow:hidden;}
.dayhd{padding:9px 16px;background:var(--paper);font-family:var(--display);font-weight:600;}
.row{display:flex;align-items:center;gap:11px;padding:12px 14px;border-top:1px solid var(--line);}
.ic{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.check{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--line);}
.check.on{background:var(--green);border-color:var(--green);}

/* modal */
.overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:14px;background:rgba(40,30,20,.45);backdrop-filter:blur(3px);}
.modal{background:var(--card);border-radius:22px;padding:22px;width:100%;max-height:90vh;overflow-y:auto;}
.modal h3{font-family:var(--display);font-size:1.35rem;}
.field{display:block;margin-bottom:12px;}
.field>span{display:block;font-size:.75rem;color:var(--ink-soft);margin-bottom:6px;}
.inp{width:100%;border-radius:12px;padding:12px;background:var(--paper);border:1px solid var(--line);color:var(--ink);}
.cov-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.cov{aspect-ratio:3/4;border-radius:10px;border:2.5px solid transparent;background-size:cover;background-position:center;}
.cov.on{border-color:var(--accent);box-shadow:0 0 0 2px var(--card),0 0 0 4px var(--accent);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:.9rem;z-index:60;animation:fi .3s ease;max-width:90vw;text-align:center;}

@media(max-width:520px){
  .wrap{padding:0 14px;}
  .title-xl{font-size:1.65rem;}
  .hero{height:172px;margin:18px 0 22px;}
  .cover{height:182px;}
  .cover h1{font-size:2rem;}
  .pill{padding:7px 10px;font-size:.78rem;}
  .modal{padding:18px;border-radius:18px;}
  .sum-bal b{font-size:1.55rem;}
  .stat .vl{font-size:1.02rem;}
  .seg button{padding:8px 11px;font-size:.82rem;}
  .cov-grid{grid-template-columns:repeat(4,1fr);}
  .toolbar .btn-accent{padding:10px 14px;font-size:.85rem;}
}
@media(max-width:340px){.cell{min-height:48px;padding:4px 2px;}.cell .am{font-size:.52rem;}}
</style>
</head>

const mem={};
const store={
  async get(k){try{if(window.storage){const r=await window.storage.get(k,false);return r?JSON.parse(r.value):null;}}catch(e){}return k in mem?mem[k]:null;},
  async set(k,v){mem[k]=v;try{if(window.storage)await window.storage.set(k,JSON.stringify(v),false);}catch(e){}},
  async del(k){delete mem[k];try{if(window.storage)await window.storage.delete(k,false);}catch(e){}},
};

const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const THB=n=>'฿'+(Number(n)||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2});
const mid=(y,m)=>y+'-'+String(m+1).padStart(2,'0');
const todayISO=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const coverCss=m=>{if(m.coverType==='image'&&m.coverValue)return `background-image:url('${m.coverValue}');background-size:cover;background-position:center;`;const c=COVERS.find(x=>x.id===m.coverValue)||COVERS[0];return `background-image:${c.css};`;};
const coverDot=m=>m.coverType==='image'&&m.coverValue?`url('${m.coverValue}')`:(COVERS.find(x=>x.id===m.coverValue)||COVERS[0]).css;
function summarize(txs,w){let i=0,e=0;for(const t of txs){if(t.wallet!==w)continue;if(t.type==='income')i+=t.amount;else e+=t.amount;}return{income:i,expense:e,balance:i-e};}
function fmtDay(iso){const[y,m,d]=iso.split('-').map(Number);const dow=DOW[new Date(y,m-1,d).getDay()];return `${dow}. ${d} ${TMS[m-1]}`;}
function isoOf(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
/* budget cycle: salary on the 28th -> month M covers (M-1)/28 .. M/27 */
function cycleRange(m){return {start:new Date(m.year,m.month-1,28),end:new Date(m.year,m.month,27)};}

const S={view:'shelf',openId:null,monthView:'calendar',wallet:'main',dd:false,order:[],months:{}};

async function boot(){
  let meta=await store.get('fd2:meta');
  if(!meta){
    const ids=Object.keys(SEED).sort((a,b)=>a<b?1:-1);
    for(const id of ids) await store.set('fd2:month:'+id,SEED[id]);
    meta={v:2,order:ids};await store.set('fd2:meta',meta);
  }
  for(const id of meta.order){const m=await store.get('fd2:month:'+id);if(m)S.months[id]=m;}
  S.order=meta.order.filter(id=>S.months[id]);
  render();
}
async function saveMonth(m){S.months[m.id]=m;await store.set('fd2:month:'+m.id,m);}
async function saveMeta(){await store.set('fd2:meta',{v:2,order:S.order});}

}

function calHTML(m,txs){
  const {start,end}=cycleRange(m);
  const startIso=isoOf(start), endIso=isoOf(end);
  const byIso={};let outOf=[];
  txs.forEach(t=>{if(t.date>=startIso&&t.date<=endIso){(byIso[t.date]=byIso[t.date]||{i:0,e:0})[t.type==='income'?'i':'e']+=t.amount;}else outOf.push(t);});
  // build the list of dates in the cycle
  const days=[];let cur=new Date(start);while(cur<=end){days.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  let cells='';for(let i=0;i<start.getDay();i++)cells+='<div></div>';
  days.forEach(d=>{
    const iso=isoOf(d);const info=byIso[iso];const today=iso===todayISO();const dn=d.getDate();
    const mark=dn===1?`<span style="font-size:.55rem;color:var(--accent);font-weight:600">${TMS[d.getMonth()]}</span>`:'';
    cells+=`<button class="cell ${info?'has':''} ${today?'today':''}" data-act="day" data-date="${iso}">
      <span class="dn" style="color:${today?'var(--accent)':'var(--ink)'};font-weight:${today?700:500}">${dn}${mark}</span>
      ${info?`<span class="am">${info.e?`<span style="color:var(--red)">-${Math.round(info.e).toLocaleString()}</span><br>`:''}${info.i?`<span style="color:var(--green)">+${Math.round(info.i).toLocaleString()}</span>`:''}</span>`:''}
    </button>`;
  });
  const rangeLbl=`รอบ 28 ${TMS[start.getMonth()]} ${start.getFullYear()+543} – 27 ${TMS[end.getMonth()]} ${end.getFullYear()+543}`;
  let outHTML='';
  if(outOf.length){outHTML=`<div style="margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)">
    <div class="hand muted" style="font-size:.8rem;margin-bottom:8px">รายการนอกรอบ</div>
    ${outOf.sort((a,b)=>a.date<b.date?-1:1).map(t=>`<button class="row" style="width:100%;background:var(--paper);border-radius:10px;border:none;margin-bottom:6px;padding:9px 13px" data-act="day" data-date="${t.date}">
      <span style="flex:1;text-align:left">${fmtDay(t.date)} · ${esc(t.desc)||'—'}</span>
      <span style="color:${t.type==='income'?'var(--green)':'var(--red)'}">${t.type==='income'?'+':'-'}${THB(t.amount)}</span></button>`).join('')}</div>`;}
  return `<div class="card soft-shadow pop" style="padding:11px">
    <div class="hand muted center" style="font-size:.78rem;margin-bottom:8px">${rangeLbl}</div>
    <div class="cal-dow">${DOW.map((d,i)=>`<div style="color:${i===0?'var(--red)':'var(--ink-soft)'}">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>${outHTML}</div>`;
}

    document.getElementById('imp-go').onclick=()=>{
      const txt=document.getElementById('imp-area').value;
      if(!txt.trim()){toast('วางข้อมูลจากชีทก่อนนะครับ');return;}
      const r=parseClip(txt,m.id);
      if(!r.txs.length){toast('ไม่พบรายการ — ลองคัดลอกทั้งแท็บอีกครั้ง');return;}
      confirmImport(m,r);
    };
  }else{
    document.getElementById('exp-copy').onclick=async()=>{
      try{await navigator.clipboard.writeText(tsv);toast('คัดลอกแล้ว — วางในชีทได้เลย');}
      catch(e){const a=document.getElementById('exp-area');a.focus();a.select();document.execCommand('copy');toast('คัดลอกแล้ว');}
    };
    document.getElementById('exp-dl').onclick=()=>{
      const csv=buildCSV(m);const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`money-${m.id}.csv`;a.click();toast('ดาวน์โหลดแล้ว');
    };
  }
}
function confirmImport(m,r){
  const cur=m.transactions.length;
  openModal(`<div class="modal pop center" style="max-width:360px">
    <h3 style="margin-bottom:8px">นำเข้าข้อมูล?</h3>
    <p class="muted" style="font-size:.88rem;margin-bottom:18px">พบ <b>${r.txs.length}</b> รายการจากชีท จะแทนที่ ${cur} รายการเดิมของ ${TM[m.month]} ${m.year+543}${r.cover?'<br>+ อัปเดตภาพปกจากช่อง L1':''}</p>
    <div style="display:flex;gap:8px"><button style="flex:1;border-radius:12px;padding:13px;background:var(--paper)" data-act="closem">ยกเลิก</button>
    <button class="btn-accent" id="imp-confirm" style="flex:1;padding:13px">นำเข้า</button></div></div>`);
  document.getElementById('imp-confirm').onclick=async()=>{
    const upd={...m,transactions:r.txs};
    if(r.cover){upd.coverType='image';upd.coverValue=r.cover;}
    await saveMonth(upd);closeModal();render();toast('นำเข้าสำเร็จ '+r.txs.length+' รายการ');
  };
}
/* ----- sheet parser (mirror of export layout & balance-delta logic) ----- */
function pnum(s){if(s==null)return null;s=String(s).replace(/฿/g,'').replace(/,/g,'').replace(/\s/g,'').trim();if(s==='')return null;const v=parseFloat(s);return isNaN(v)?null:v;}
function isDateStr(s){return /^\s*\d{1,2}\/\d{1,2}\/\d{2}\s*$/.test(s||'');}
function parseD(s,fallback){if(!isDateStr(s))return fallback;const p=s.trim().split('/').map(Number);return (2000+p[2])+'-'+String(p[1]).padStart(2,'0')+'-'+String(p[0]).padStart(2,'0');}
function csvSplit(line){const out=[];let cur='',q=false;for(let i=0;i<line.length;i++){const c=line[i];if(q){if(c==='"'){if(line[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}else{if(c==='"')q=true;else if(c===','){out.push(cur);cur='';}else cur+=c;}}out.push(cur);return out;}
function parseClip(text,monthId){
  text=text.replace(/\r/g,'');const useTab=text.indexOf('\t')>=0;
  const rows=text.split('\n').map(l=>useTab?l.split('\t'):csvSplit(l));
  const txs=[];let cover='';
  let lastMain=monthId+'-01',lastSec=monthId+'-01',prevMain=null,prevSec=null,firstMain=true,firstSec=true;
  rows.forEach((r,idx)=>{while(r.length<12)r.push('');
    if(idx===0){const c=(r[11]||'').trim();if(/^https?:\/\//.test(c))cover=c;}
    const amt=pnum(r[1]),bal=pnum(r[2]),desc=(r[3]||'').trim(),paid=(r[4]||'').trim().toUpperCase()==='TRUE';
    if(amt!==null&&amt>0&&desc!=='Comment'){
      const date=parseD(r[0],lastMain);lastMain=date;
      let typ;if(firstMain){typ='income';firstMain=false;}else if(bal!==null&&prevMain!==null){typ=bal>prevMain?'income':'expense';}else typ='expense';
      if(bal!==null)prevMain=bal;
      txs.push({id:uid(),date,desc,amount:Math.round(amt*100)/100,type:typ,wallet:'main',comment:'',paid});
    }
    if(isDateStr(r[6])){const samt=pnum(r[7]),sbal=pnum(r[8]),sdesc=(r[9]||'').trim();
      if(samt!==null&&samt>0){const date=parseD(r[6],lastSec);lastSec=date;
        let typ;if(firstSec){typ='income';firstSec=false;}else if(sbal!==null&&prevSec!==null){typ=sbal>prevSec?'income':'expense';}else typ='expense';
        if(sbal!==null)prevSec=sbal;
        txs.push({id:uid(),date,desc:sdesc,amount:Math.round(samt*100)/100,type:typ,wallet:'second',comment:'',paid:false});
      }}
  });
  return {txs,cover};
}

/* export builders */
function buildRows(m){
  const main=m.transactions.filter(t=>t.wallet==='main').slice().sort((a,b)=>a.date<b.date?-1:1);
  const sec=m.transactions.filter(t=>t.wallet==='second').slice().sort((a,b)=>a.date<b.date?-1:1);
  let bm=0,bs=0;
  const mr=main.map(t=>{bm+=t.type==='income'?t.amount:-t.amount;return [t.date,t.amount,Math.round(bm*100)/100,t.desc,t.paid?'TRUE':''];});
  const sr=sec.map(t=>{bs+=t.type==='income'?t.amount:-t.amount;return [t.date,t.amount,Math.round(bs*100)/100,t.desc,t.paid?'TRUE':''];});
  const n=Math.max(mr.length,sr.length);
  const cover=m.coverType==='image'?m.coverValue:'';
  const rows=[['Date','Lists','Balance','Comment','Paid','','Date','Lists','Balance','Comment','Cover(L1)',cover]];
  for(let i=0;i<n;i++){const a=mr[i]||['','','','',''];const b=sr[i]||['','','','',''];rows.push([...a,'',...b]);}
  return rows;
}
function buildTSV(m){return buildRows(m).map(r=>r.join('\t')).join('\n');}
function buildCSV(m){return buildRows(m).map(r=>r.map(c=>{c=String(c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(',')).join('\n');}

/* mutations */
async function upsertTx(tx){
  const m=S.months[S.openId];
  const list=m.transactions.find(t=>t.id===tx.id)?m.transactions.map(t=>t.id===tx.id?tx:t):[...m.transactions,tx];
  if(tx.wallet)S.wallet=tx.wallet;
  await saveMonth({...m,transactions:list});closeModal();render();
}
async function removeTx(id){const m=S.months[S.openId];await saveMonth({...m,transactions:m.transactions.filter(t=>t.id!==id)});closeModal();render();}
async function setCover(type,val){const m=S.months[S.openId];await saveMonth({...m,coverType:type,coverValue:val});closeModal();render();}
async function createMonth(y,mo,cov,carry){
  const id=mid(y,mo);
  if(S.months[id]){S.view='month';S.openId=id;S.dd=false;closeModal();render();return;}
  let txs=[];
  const cs=isoOf(new Date(y,mo-1,28));
  if(carry&&S.order.length){
    const last=S.months[S.order[0]];const rec=['AIS','AIS ','AIS Fiber','AIS FIBER','ค่าไฟฟ้า','ประกันสุขภาพ ','ประกันสุขภาพ','Shopeepay','Youtube Premirem'];const seen=new Set();
    last.transactions.forEach(t=>{const d=t.desc.trim();if(t.wallet==='main'&&t.type==='expense'&&rec.includes(t.desc)&&!seen.has(d)){seen.add(d);txs.push({id:uid(),date:cs,desc:d,amount:t.amount,type:'expense',wallet:'main',comment:'ประจำเดือน',paid:false});}});
  }
  const m={id,year:y,month:mo,coverType:'preset',coverValue:cov,transactions:txs};
  S.order=[id,...S.order].sort((a,b)=>a<b?1:-1);
  await saveMonth(m);await saveMeta();
  S.view='month';S.openId=id;S.wallet='main';S.monthView='calendar';S.dd=false;closeModal();render();
}
async function deleteMonth(id){S.order=S.order.filter(x=>x!==id);delete S.months[id];await store.del('fd2:month:'+id);await saveMeta();S.view='shelf';S.openId=null;closeModal();render();}

function defaultDate(){const m=S.months[S.openId];const {start,end}=cycleRange(m);const t=new Date();return (t>=start&&t<=end)?todayISO():isoOf(start);}
function newTx(date){return {id:uid(),date:date||defaultDate(),desc:'',amount:'',type:'expense',wallet:S.wallet,comment:'',paid:false,_new:true};}

let toastT;function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);clearTimeout(toastT);toastT=setTimeout(()=>el.remove(),1800);}

/* event delegation */
document.addEventListener('click',e=>{
  if(e.target.classList&&e.target.classList.contains('overlay')){closeModal();return;}
  const t=e.target.closest('[data-act]');
  if(S.dd&&!e.target.closest('.dd')){S.dd=false;render();return;}
  if(!t)return;
  const a=t.dataset.act;
  switch(a){
    case 'open':S.view='month';S.openId=t.dataset.id;S.wallet='main';S.monthView='calendar';S.dd=false;closeModal();render();break;
    case 'back':S.view='shelf';S.openId=null;render();break;
    case 'dd-toggle':S.dd=!S.dd;render();break;
    case 'switch':monthPickerModal();break;
    case 'create':createModal();break;
    case 'view':S.monthView=t.dataset.v;render();break;
    case 'wallet':S.wallet=t.dataset.w;render();break;
    case 'add':txModal(newTx());break;
    case 'addday':txModal(newTx(t.dataset.date));break;
    case 'edit':{const m=S.months[S.openId];txModal(m.transactions.find(x=>x.id===t.dataset.id));break;}
    case 'toggle':{const m=S.months[S.openId];const tx=m.transactions.find(x=>x.id===t.dataset.id);upsertTx({...tx,paid:!tx.paid});break;}
    case 'day':dayModal(t.dataset.date);break;
    case 'cover':coverModal();break;
    case 'setcover':setCover(t.dataset.type,t.dataset.val);break;
    case 'sheet':sheetModal('import');break;
    case 'deltx':removeTx(t.dataset.id);break;
    case 'delmonth':confirmDel();break;
    case 'closem':closeModal();break;
  }
});
function confirmDel(){
  const m=S.months[S.openId];
  openModal(`<div class="modal pop center" style="max-width:340px">
    <h3 style="margin-bottom:8px">ลบสมุดเดือนนี้?</h3>
    <p class="muted" style="font-size:.88rem;margin-bottom:18px">${TM[m.month]} ${m.year+543} จะถูกลบถาวร</p>
    <div style="display:flex;gap:8px"><button style="flex:1;border-radius:12px;padding:13px;background:var(--paper)" data-act="closem">ยกเลิก</button>
    <button id="del-go" style="flex:1;border-radius:12px;padding:13px;background:var(--red);color:#fff">ลบ</button></div></div>`);
  document.getElementById('del-go').onclick=()=>deleteMonth(m.id);
}

boot();
</script>
